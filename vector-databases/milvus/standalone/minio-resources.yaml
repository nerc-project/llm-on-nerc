---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  labels:
    app: milvus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi  # Adjust the size according to your needs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-deployment
  labels:
    app: milvus
    app.kubernetes.io/part-of: MilvusDB
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      volumes:
        - name: minio-volume
          persistentVolumeClaim:
            claimName: minio-pvc
      containers:
        - name: minio-container
          image: quay.io/minio/minio:RELEASE.2023-04-13T03-08-07Z
          imagePullPolicy: IfNotPresent
          env:
            - name: MINIO_ACCESS_KEY
              value: minioadmin  # Make sure to use secure Access Key
            - name: MINIO_SECRET_KEY
              value: minioadmin  # Make sure to use secure Secret Key
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          command:
            - "minio"
            - "server"
            - "/data"
            - "--console-address"
            - ":9001"
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: "0.5"
              memory: 512Mi
          volumeMounts:
            - name: minio-volume
              mountPath: /data
      restartPolicy: Always
  strategy:
    type: Recreate
---
apiVersion: v1
kind: Service
metadata:
  name: minio-service
  labels:
    app: milvus
spec:
  selector:
    app: minio
  ports:
    - name: console
      protocol: TCP
      port: 9001
      targetPort: 9001
    - name: api
      protocol: TCP
      port: 9000
      targetPort: 9000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: minio-console
  labels:
    app: milvus
spec:
  to:
    kind: Service
    name: minio-service
    weight: 100
  port:
    targetPort: 9001
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
